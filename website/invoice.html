<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation | Dripkits</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --black: #0A0A0A;
            --black-soft: #141414;
            --charcoal: #1A1A1A;
            --charcoal-line: #2B2B2B;
            --gold: #D4AF37;
            --gold-bright: #F0C846;
            --off-white: #EDEAE0;
            --muted: #9A958A;
            --font-display: 'Anton', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black);
            color: var(--off-white);
            font-family: var(--font-body);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            background: var(--black-soft);
            border-bottom: 1px solid var(--charcoal-line);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: var(--off-white);
            text-decoration: none;
        }

        .logo span {
            color: var(--gold);
        }

        /* ── Page wrapper ── */
        .page {
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        /* ── Loading / error states ── */
        .state-box {
            text-align: center;
            padding: 60px 20px;
        }

        .state-box .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 16px;
        }

        .state-box h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .state-box p {
            color: var(--muted);
            font-size: 0.9rem;
        }

        /* ── Success banner ── */
        .success-banner {
            background: rgba(76, 175, 80, 0.1);
            border: 1.5px solid #4caf50;
            border-radius: 8px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .success-banner .icon {
            font-size: 2.2rem;
            flex-shrink: 0;
        }

        .success-banner h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .success-banner p {
            font-size: 0.85rem;
            color: var(--muted);
        }

        /* ── Invoice card ── */
        .invoice-card {
            background: var(--black-soft);
            border: 1px solid var(--charcoal-line);
            border-radius: 10px;
            overflow: hidden;
        }

        .invoice-header {
            background: var(--charcoal);
            padding: 22px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid var(--charcoal-line);
        }

        .invoice-header .brand {
            font-family: var(--font-display);
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        .invoice-header .brand span {
            color: var(--gold);
        }

        .order-num-badge {
            background: var(--gold);
            color: #000;
            font-weight: 800;
            font-size: 0.85rem;
            padding: 6px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .invoice-body {
            padding: 28px;
        }

        /* ── Info grid ── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        @media (max-width: 540px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        .info-block h4 {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .info-block p {
            font-size: 0.88rem;
            line-height: 1.7;
            color: var(--off-white);
        }

        .info-block .highlight {
            color: var(--gold);
            font-weight: 700;
        }

        /* ── Status pill ── */
        .status-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: capitalize;
        }

        .status-pending {
            background: rgba(224, 168, 0, 0.15);
            color: #e0a800;
        }

        .status-confirmed {
            background: rgba(33, 150, 243, 0.15);
            color: #42a5f5;
        }

        .status-shipped {
            background: rgba(156, 39, 176, 0.15);
            color: #ce93d8;
        }

        .status-delivered {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }

        .status-cancelled {
            background: rgba(244, 67, 54, 0.15);
            color: #ef5350;
        }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 1px solid var(--charcoal-line);
            margin: 24px 0;
        }

        /* ── Items table ── */
        .items-title {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .item-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid var(--charcoal-line);
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-row img {
            width: 48px;
            height: 56px;
            object-fit: cover;
            border-radius: 4px;
            background: var(--charcoal);
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
        }

        .item-info .name {
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .item-info .meta {
            font-size: 0.78rem;
            color: var(--muted);
        }

        .item-price {
            font-weight: 700;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        /* ── Totals ── */
        .totals {
            margin-top: 20px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.87rem;
            padding: 6px 0;
            color: var(--muted);
        }

        .total-row.grand {
            color: var(--off-white);
            font-weight: 800;
            font-size: 1rem;
            border-top: 1px solid var(--charcoal-line);
            margin-top: 8px;
            padding-top: 14px;
        }

        /* ── Invoice footer ── */
        .invoice-footer {
            background: var(--charcoal);
            border-top: 1px solid var(--charcoal-line);
            padding: 18px 28px;
            font-size: 0.8rem;
            color: var(--muted);
            text-align: center;
        }

        /* ── Action buttons ── */
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 6px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: var(--gold);
            color: #000;
        }

        .btn-outline {
            background: transparent;
            color: var(--off-white);
            border: 1.5px solid var(--charcoal-line);
        }

        .btn-outline:hover {
            border-color: var(--gold);
        }

        /* ── Track note ── */
        .track-note {
            margin-top: 20px;
            background: rgba(212, 175, 55, 0.07);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .track-note strong {
            color: var(--gold);
        }

        /* ── Print styles ── */
        @media print {
            body {
                background: #fff;
                color: #000;
            }

            header,
            .actions,
            .track-note,
            .success-banner {
                display: none !important;
            }

            .invoice-card {
                border: 1px solid #ccc;
                border-radius: 0;
            }

            .invoice-header {
                background: #f5f5f5;
            }

            .invoice-footer {
                background: #f5f5f5;
            }

            .status-pill {
                border: 1px solid currentColor;
            }

            * {
                color: inherit !important;
            }

            .order-num-badge {
                background: #000;
                color: #fff;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="logo">DRIP<span>KITS</span></a>
        <span style="font-size:0.82rem;color:var(--muted);">🔒 Order Confirmation</span>
    </header>

    <div class="page" id="page">
        <div class="state-box">
            <span class="emoji">⏳</span>
            <h2>Loading your order...</h2>
        </div>
    </div>

    <script src="config.js"></script>
    <script>

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order');
        const page = document.getElementById('page');

        async function load() {
            if (!orderId) {
                page.innerHTML = `
                    <div class="state-box">
                        <span class="emoji">❓</span>
                        <h2>No order number found</h2>
                        <p>Please check the link or <a href="track.html" style="color:var(--gold);">track your order manually</a>.</p>
                    </div>`;
                return;
            }

            try {
                const res = await fetch(`${BACKEND_URL}/api/orders/${orderId}/track`);
                const data = await res.json();

                if (!res.ok) {
                    page.innerHTML = `
                        <div class="state-box">
                            <span class="emoji">❌</span>
                            <h2>Order not found</h2>
                            <p>${data.error || 'Could not find this order.'}</p>
                        </div>`;
                    return;
                }

                renderInvoice(data);

            } catch (err) {
                page.innerHTML = `
                    <div class="state-box">
                        <span class="emoji">⚠️</span>
                        <h2>Could not connect</h2>
                        <p>Make sure the backend server is running, then refresh this page.</p>
                    </div>`;
            }
        }

        function statusClass(s) {
            return `status-pill status-${s}`;
        }

        function formatDate(iso) {
            return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function renderInvoice(o) {
            const itemsHtml = o.items.map(item => `
                <div class="item-row">
                    <img src="${item.img || 'favicon.png'}" alt="${item.name}" onerror="this.src='favicon.png'">
                    <div class="item-info">
                        <div class="name">${item.name}</div>
                        <div class="meta">${item.size ? 'Size: ' + item.size + ' &nbsp;·&nbsp; ' : ''}Qty: ${item.qty}${item.customization ? `<br><span style="color:#D4AF37;font-weight:600;">⚽ Name: ${item.customization.name || '—'} &nbsp;·&nbsp; Number: ${item.customization.number || '—'}</span>` : ''}</div>
                    </div>
                    <div class="item-price">Tk ${(item.price * item.qty).toLocaleString()}</div>
                </div>
            `).join('');

            page.innerHTML = `
                <div class="success-banner">
                    <div class="icon">🎉</div>
                    <div>
                        <h2>Order Placed Successfully!</h2>
                        <p>We've received your order and will verify your ${o.paymentApp ? o.paymentApp.toUpperCase() : 'bKash/Nagad'} payment shortly. Save your order number to track your delivery.</p>
                    </div>
                </div>

                <div class="invoice-card" id="invoicePrint">

                    <div class="invoice-header">
                        <div class="brand">DRIP<span>KITS</span></div>
                        <div class="order-num-badge">Order #${o.orderId}</div>
                    </div>

                    <div class="invoice-body">

                        <div class="info-grid">
                            <div class="info-block">
                                <h4>Customer</h4>
                                <p>${o.customerName}<br>${o.customerCity}</p>
                            </div>
                            <div class="info-block">
                                <h4>Order Date</h4>
                                <p>${formatDate(o.createdAt)}</p>
                            </div>
                            <div class="info-block">
                                <h4>Delivery Area</h4>
                                <p>${o.deliveryArea === 'inside' ? 'Inside Dhaka' : 'Outside Dhaka'}</p>
                            </div>
                            <div class="info-block">
                                <h4>Order Status</h4>
                                <p><span class="${statusClass(o.orderStatus)}">${o.orderStatus}</span></p>
                            </div>
                            <div class="info-block">
                                <h4>Payment Method</h4>
                                <p>Cash on Delivery<br>
                                   <span style="font-size:0.8rem;color:var(--muted);">Delivery charge paid via ${o.paymentApp ? o.paymentApp.toUpperCase() : 'bKash/Nagad'}</span>
                                </p>
                            </div>
                            <div class="info-block">
                                <h4>Delivery Charge Status</h4>
                                <p>${o.paymentStatus === 'paid'
                    ? '<span class="status-pill status-delivered">✅ Verified</span>'
                    : '<span class="status-pill status-pending">⏳ Pending Verification</span>'
                }
                                </p>
                            </div>
                        </div>

                        <hr class="divider">

                        <div class="items-title">Items Ordered</div>
                        ${itemsHtml}

                        <div class="totals">
                            <div class="total-row"><span>Products Total</span><span>Tk ${o.itemsTotal.toLocaleString()}</span></div>
                            <div class="total-row"><span>Delivery Fee <span style="color:#4caf50;font-size:0.78rem;">(already paid via ${o.paymentApp ? o.paymentApp.toUpperCase() : 'bKash/Nagad'})</span></span><span style="color:#4caf50;">Tk ${o.deliveryFee.toLocaleString()}</span></div>
                            <div class="total-row grand"><span>💵 Pay on Delivery (Cash)</span><span>Tk ${o.itemsTotal.toLocaleString()}</span></div>
                        </div>

                    </div>

                    <div class="invoice-footer">
                        Dripkits · Thank you for your order! For support, message us on WhatsApp.
                    </div>

                </div>

                <div class="track-note">
                    📦 <strong>Your order number is #${o.orderId}</strong> — save it! You can use this number to
                    <a href="track.html?order=${o.orderId}" style="color:var(--gold);font-weight:700;">track your order status</a>
                    at any time.
                </div>

                <div class="actions">
                    <button class="btn btn-primary" onclick="window.print()">🖨️ Print / Save Invoice</button>
                    <a href="track.html?order=${o.orderId}" class="btn btn-outline">📦 Track This Order</a>
                    <a href="index.html" class="btn btn-outline">← Back to Home</a>
                </div>
            `;
        }

        load();
    </script>

</body>

</html>
